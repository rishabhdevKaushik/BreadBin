name: bread_bin
description: An expense tracking application for managing your daily expenses.
publish_to: "none"

version: 0.0.0+1

environment:
    sdk: ^3.8.1

dependencies:
    flutter:
        sdk: flutter
    shared_preferences: ^2.2.2
    cupertino_icons: ^1.0.8
    flutter_sticky_header: ^0.8.0

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0
    flutter_launcher_icons: ^0.14.4
    change_app_package_name: ^1.4.0


flutter:
    uses-material-design: true
    assets:
        - assets/icons/ 

flutter_launcher_icons:
    android: true
    ios: true
    image_path_ios: "assets/icons/app_icon.png"
    image_path_android: "assets/icons/app_icon.png"
    adaptive_icon_foreground: "assets/icons/app_icon.png"
    adaptive_icon_background: "assets/icons/app_background.png"
